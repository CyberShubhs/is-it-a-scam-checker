name: Auto Blog Post
# Generates 2 AI-written scam/cybersecurity blog posts daily using Gemini (with Groq fallback).
# Posts are committed directly to main — fully automatic, no PR review needed.
# Schedule: 6AM UTC and 6PM UTC (2 posts per day).

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        run: npx tsx scripts/generate-scam-post.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Check whether a post was generated
        id: precheck
        run: |
          git add content/blog/
          if git diff --cached --quiet; then
            echo "generated=false" >> "$GITHUB_OUTPUT"
            echo "No new post generated (likely duplicate-topic skip). Stopping cleanly."
          else
            echo "generated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate (type-check, lint, tests, links, SEO, blog quality, blog sources, build)
        if: steps.precheck.outputs.generated == 'true'
        run: |
          set -e
          npm run type-check
          npm run lint
          npm run test -- --run
          npm run test:links
          npm run test:seo
          npm run test:blog-quality
          # Static gate on every post.
          npm run test:blog-sources
          # Network gate only on the freshly generated post(s). Legacy 404s
          # in older posts are surfaced separately by a non-blocking
          # `--soft --network` audit (see SEO/reports/), but they do not
          # block new commits.
          git diff --cached --name-only -- 'content/blog/*.mdx' \
            | node scripts/check-blog-sources.mjs --network --changed-only
          npm run build

      - name: Commit and push
        if: steps.precheck.outputs.generated == 'true'
        run: |
          echo "=== Debug: generated files ==="
          ls -la content/blog/ || echo "content/blog/ does not exist"
          echo ""
          echo "=== Debug: current branch ==="
          git branch --show-current
          echo ""

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "=== Debug: git status after staging ==="
          git status --short
          echo ""

          TITLE=$(git diff --cached --name-only | head -1 | xargs basename | sed 's/\.mdx//')
          echo "=== Debug: committing post: ${TITLE} ==="
          git commit -m "blog: auto-publish ${TITLE}"
          echo ""
          echo "=== Debug: pushing to origin main ==="
          git push origin main
          echo "=== Done: push successful ==="
