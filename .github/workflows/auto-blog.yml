name: Auto Blog Post
# Generates ONE high-quality, long-form scam/cybersecurity SEO article per week
# using Gemini (primary) with Groq as fallback. Posts are committed directly to
# main — fully automatic, no PR review needed.
#
# Schedule: weekly, Sunday 22:00 UTC. That is Monday ~08:00 in Australia/Sydney
# (AEST, UTC+10) and ~09:00 during daylight saving (AEDT, UTC+11) — i.e. Monday
# morning Sydney year-round. GitHub Actions cron is UTC-only, so we encode the
# Sydney target as a UTC time rather than a timezone.
#
# Manual runs: use "Run workflow" (workflow_dispatch). Tick `dry_run` to
# generate + validate WITHOUT writing/committing a post (the generator honours
# the DRY_RUN env var and produces no file, so nothing is committed).

on:
  schedule:
    - cron: '0 22 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate + validate but do not write/commit a post'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        run: npx tsx scripts/generate-scam-post.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Optional model override. Defaults to gemini-2.5-pro in the generator.
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          # Optional Groq fallback (used only if Gemini fails).
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # When dry_run is ticked on a manual run, the generator validates but
          # writes no file, so the steps below find nothing to commit.
          DRY_RUN: ${{ github.event.inputs.dry_run }}

      - name: Detect what changed
        id: precheck
        run: |
          # Stage BOTH the new post (if any) AND the question-bank ledger.
          # A single duplicate-topic skip used to stop the workflow with no
          # ledger commit — that meant the same colliding question got
          # re-picked the next day. Now the ledger is committed even when
          # no post is generated, so the skip persists.
          git add content/blog/ data/used-blog-questions.json

          if git diff --cached --quiet -- content/blog/; then
            echo "post_generated=false" >> "$GITHUB_OUTPUT"
            echo "No new blog post staged."
          else
            echo "post_generated=true" >> "$GITHUB_OUTPUT"
            echo "New blog post staged."
          fi

          if git diff --cached --quiet -- data/used-blog-questions.json; then
            echo "ledger_changed=false" >> "$GITHUB_OUTPUT"
            echo "Question-bank ledger unchanged."
          else
            echo "ledger_changed=true" >> "$GITHUB_OUTPUT"
            echo "Question-bank ledger changed."
          fi

      - name: Validate (type-check, lint, tests, links, SEO, blog quality, blog sources, build)
        if: steps.precheck.outputs.post_generated == 'true'
        run: |
          set -e
          npm run type-check
          npm run lint
          npm run test -- --run
          npm run test:links
          npm run test:seo
          npm run test:blog-quality
          # Static gate on every post (no network).
          npm run test:blog-sources
          # Strict network gate ONLY on the freshly generated post(s).
          # Historical 404s in older posts are surfaced by the separate
          # weekly audit workflow (.github/workflows/blog-source-audit.yml)
          # and do not block daily publishing.
          git diff --cached --name-only -- 'content/blog/*.mdx' \
            | node scripts/check-blog-sources.mjs --network --changed-only
          npm run build

      - name: Commit and push (new blog post)
        if: steps.precheck.outputs.post_generated == 'true'
        run: |
          echo "=== Debug: generated files ==="
          ls -la content/blog/ || echo "content/blog/ does not exist"
          echo ""
          echo "=== Debug: current branch ==="
          git branch --show-current
          echo ""

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "=== Debug: git status after staging ==="
          git status --short
          echo ""

          TITLE=$(git diff --cached --name-only -- 'content/blog/*.mdx' | head -1 | xargs basename | sed 's/\.mdx//')
          echo "=== Debug: committing post: ${TITLE} ==="
          # The commit includes the staged ledger update so the question is
          # marked "used" in the same commit that publishes the post.
          git commit -m "blog: auto-publish ${TITLE}"
          echo ""
          echo "=== Debug: pushing to origin main ==="
          git push origin main
          echo "=== Done: push successful ==="

      - name: Commit and push (ledger-only — duplicate-topic skips)
        if: steps.precheck.outputs.post_generated == 'false' && steps.precheck.outputs.ledger_changed == 'true'
        run: |
          # The generator skipped one or more questions as duplicate-topic
          # without producing a publishable post. We still commit the ledger
          # so the same colliding questions do not stop tomorrow's run.
          echo "=== Debug: ledger-only commit ==="
          git diff --cached --stat
          echo ""

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "blog: record duplicate-topic skips in question-bank ledger"
          git push origin main
          echo "=== Done: ledger-only push successful ==="

      - name: Nothing to commit
        if: steps.precheck.outputs.post_generated == 'false' && steps.precheck.outputs.ledger_changed == 'false'
        run: |
          # No post, no ledger change — quality-gate failure or provider
          # error. Exit cleanly; tomorrow's scheduled run will try again.
          echo "No blog post and no ledger change to commit. Exiting cleanly."
